<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title data-i18n="title">Судоку</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/board.css" />
  <link rel="stylesheet" href="css/ui.css" />
</head>
<body>
  <div class="app">

    <!-- Шапка -->
    <header class="header">
      <div class="header__left" id="mistakes-block">
        <span class="header__label" data-i18n="mistakes">Ошибки</span>
        <span class="header__value" id="mistakes">0 / 3</span>
      </div>
      <h1 class="header__title" data-i18n="title">Судоку</h1>
      <div class="header__right">
        <span class="header__label" data-i18n="time">Время</span>
        <span class="header__value" id="timer">00:00</span>
      </div>
    </header>

    <!-- Панель сложности -->
    <div class="difficulty-bar">
      <button class="difficulty-btn difficulty-btn--active" data-difficulty="easy" data-i18n="diffEasy">Лёгкий</button>
      <button class="difficulty-btn" data-difficulty="medium" data-i18n="diffMedium">Средний</button>
      <button class="difficulty-btn" data-difficulty="hard" data-i18n="diffHard">Сложный</button>
    </div>

    <!-- Игровое поле -->
    <main class="board-wrapper">
      <div class="board" id="board" role="grid" data-i18n="boardLabel" data-i18n-attr="aria-label" aria-label="Игровое поле судоку">
        <!-- 81 ячейка — временная статика для проверки вёрстки (заменится JS) -->
      <div class="cell cell--locked">5</div><div class="cell cell--locked">3</div><div class="cell"></div><div class="cell cell--locked">6</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">9</div><div class="cell cell--locked">8</div>
      <div class="cell cell--locked">6</div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">1</div><div class="cell cell--locked">9</div><div class="cell cell--locked">5</div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell cell--locked">9</div><div class="cell cell--locked">8</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">6</div><div class="cell"></div>
      <div class="cell cell--locked">8</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">6</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">3</div>
      <div class="cell cell--locked">4</div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">8</div><div class="cell"></div><div class="cell cell--locked">3</div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">1</div>
      <div class="cell cell--locked">7</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">2</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">6</div>
      <div class="cell"></div><div class="cell cell--locked">6</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">2</div><div class="cell cell--locked">8</div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">4</div><div class="cell cell--locked">1</div><div class="cell cell--locked">9</div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">5</div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">8</div><div class="cell"></div><div class="cell"></div><div class="cell cell--locked">7</div><div class="cell cell--locked">9</div>
      </div>
    </main>

    <!-- Панель управления -->
    <div class="controls">
      <button class="control-btn" id="btn-erase" data-i18n="erase" data-i18n-attr="aria-label" aria-label="Стереть">
        <span class="control-btn__icon">⌫</span>
        <span class="control-btn__label" data-i18n="erase">Стереть</span>
      </button>
      <button class="control-btn control-btn--pencil" id="btn-pencil" aria-label="Режим заметок" aria-pressed="false">
        <span class="control-btn__icon">✏️</span>
        <span class="control-btn__label" data-i18n="notes">Заметки</span>
      </button>
      <button class="control-btn" id="btn-new" data-i18n="newGame" data-i18n-attr="aria-label" aria-label="Новая игра">
        <span class="control-btn__icon">⊕</span>
        <span class="control-btn__label" data-i18n="newGame">Новая</span>
      </button>
      <button class="control-btn" id="btn-hint" data-i18n="hint" data-i18n-attr="aria-label" aria-label="Подсказка">
        <span class="control-btn__icon">💡</span>
        <span class="control-btn__label" data-i18n="hint">Подсказка</span>
      </button>
      <button class="control-btn" id="btn-settings" data-i18n="settings" data-i18n-attr="aria-label" aria-label="Настройки">
        <span class="control-btn__icon">⚙</span>
        <span class="control-btn__label" data-i18n="settings">Настройки</span>
      </button>
    </div>

    <!-- Цифровая панель -->
    <div class="numpad" role="group" data-i18n="numpadLabel" data-i18n-attr="aria-label" aria-label="Цифровая панель">
      <button class="numpad-btn" data-value="1">1</button>
      <button class="numpad-btn" data-value="2">2</button>
      <button class="numpad-btn" data-value="3">3</button>
      <button class="numpad-btn" data-value="4">4</button>
      <button class="numpad-btn" data-value="5">5</button>
      <button class="numpad-btn" data-value="6">6</button>
      <button class="numpad-btn" data-value="7">7</button>
      <button class="numpad-btn" data-value="8">8</button>
      <button class="numpad-btn" data-value="9">9</button>
    </div>

  </div>

  <!-- Скрипты -->
  <script src="js/hint.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/board.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/history.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/input.js"></script>
  <script src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
